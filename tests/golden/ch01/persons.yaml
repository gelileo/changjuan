# Golden Ch.1 — Persons
#
# Required: id, canonical_name, citations[]  (loader-enforced)
#
# Phase 2 convention: variants of the same person stay as SEPARATE records
# if they would require stage-5 linking to merge. In Ch.1 the only variant
# folding is 宣王 ↔ 周宣王 (same name, just abbreviated form within the
# chapter) — these stay as ONE record with variants[].
#
# Scope decision (see README): we record named figures who participate in
# events of this chapter's narrative, plus unnamed-but-acting figures
# (the executed wife, the man who found 女婴, the 老宫人, the 女婴 herself).
# Background figures named only in the opening recap (武王, 厉王, 周公 the
# Western Zhou original, 方叔, 申伯, 桀王, etc.) are NOT recorded here —
# they belong to chapters where they act, or to a separate "background
# mentions" pass.
#
# Hash IDs for unnamed Persons follow the README convention `per:_<hash>`.

