# ===========================================================================
# event_place — places attested with role in addition to primary_place_id
# ===========================================================================

# 千亩 already primary on its event — no secondary place
# 太原 already primary
# 童谣 happened on the road back from 太原 to 镐京 — 镐京 is primary, road implied
# 童谣 council in 镐京 — primary
# 老宫人 birth in 镐京 (palace) — primary
# 弃婴 — 镐京 (where 姜后 ordered it) AND 清水河 (where it ended up). Primary chosen as 清水河; record 镐京 as secondary
