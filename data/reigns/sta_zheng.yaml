rulers:
  - id: 郑武公
    posthumous_name: 武公
    given_name: 掘突
    reign_start_bce: 770
    reign_end_bce: 744
    sources:
      - 《史记·郑世家》
    confidence: high
    notes: |
      Succeeded 郑桓公 (友) who died with 周幽王 in 犬戎之乱 of 771 BCE.
      武公 escorted 周平王 east to 雒邑 and served as 周 minister.
  - id: 郑庄公
    posthumous_name: 庄公
    given_name: 寤生
    reign_start_bce: 743
    reign_end_bce: 701
    sources:
      - 《史记·郑世家》
      - 《左传·隐公元年》
    confidence: high
    notes: |
      Famous early-春秋 ruler. Conflict with 周桓王 culminated in 繻葛之战 (707 BCE).
      Brother 共叔段 rebellion (722 BCE) opens 《左传》.
  - id: 郑昭公
    posthumous_name: 昭公
    given_name: 忽
    reign_start_bce: 700
    reign_end_bce: 700
    sources:
      - 《史记·郑世家》
    confidence: high
    notes: |
      First reign — briefly succeeded 庄公 in 700 BCE but expelled by 祭仲 the same year.
      Restored later (see entry below for second reign 696-695 BCE).
  - id: 郑厉公一
    posthumous_name: 厉公
    given_name: 突
    reign_start_bce: 700
    reign_end_bce: 697
    sources:
      - 《史记·郑世家》
    confidence: high
    notes: |
      First reign — installed by 宋庄公 + 祭仲 in place of 昭公. Expelled in 697 BCE.
      Restored later (see entry below for second reign 679-673 BCE).
  - id: 郑昭公二
    posthumous_name: 昭公
    given_name: 忽
    reign_start_bce: 696
    reign_end_bce: 695
    sources:
      - 《史记·郑世家》
    confidence: high
    notes: Restored after 厉公一 expelled. Killed by 高渠弥 in 695 BCE.
  - id: 郑子亹
    posthumous_name: ""
    given_name: 亹
    reign_start_bce: 694
    reign_end_bce: 694
    sources:
      - 《史记·郑世家》
    confidence: high
    notes: |
      Installed by 高渠弥 after 昭公 killed. Murdered by 齐襄公 at 首止 the same year.
      No 谥号; referenced as 子亹 in 《左传》.
  - id: 郑子婴
