# Pre-commit framework integration for the living-docs drift check.
# See https://pre-commit.com for installation.
#
# Drop into your project's `.pre-commit-config.yaml` (or merge with
# existing) and run `pre-commit install` once.

repos:
  - repo: local
    hooks:
      - id: living-docs-drift-check
        name: Living Docs drift check
        entry: scripts/drift-check
        language: system
        pass_filenames: false
        always_run: true
        # Diff working tree against last commit — matches what we're
        # about to commit.
        args: [--base-ref, HEAD]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [structlog, typer, pytest]
        args: [--config-file=mypy.ini]
        files: ^(pipeline|curation|tests)/
