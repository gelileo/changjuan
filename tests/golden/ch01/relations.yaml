# Golden Ch.1 — Relations
#
# Typed-envelope format: every record has a `kind:` field discriminating which
# relation table it maps to.
#
# Coverage strategy: every event in events.yaml gets at least one
# event_participant entry; every place where a non-primary place is meaningful
# gets an event_place entry; person→person lineage/friendship/rivalry facts
# go in person_relation; state-capital facts go in state_capital;
# person→state role facts (ruler, minister, exile-to) go in person_state.

