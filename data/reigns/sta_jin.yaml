      曲沃 武公 — completed displacement of 翼 (大宗) line in 679 BCE. Recognized as
      晋 ruler by 周 in 678 BCE. Brief reign as unified 晋 ruler (2 years). Some
      sources count from his 曲沃 takeover (715 BCE) but 晋 reign proper is 678-677.
